services:
  postgres:
    image: postgres:16
    container_name: rqmd-telemetry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rqmd_telemetry}
      POSTGRES_USER: ${POSTGRES_USER:-rqmd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.telemetry.v1}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - /opt/rqmd/telemetry-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rqmd} -d ${POSTGRES_DB:-rqmd_telemetry}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: rqmd-telemetry-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env.telemetry.v1}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-19000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - /opt/rqmd/telemetry-data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: rqmd-telemetry-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-rqmd-telemetry} &&
      echo 'MinIO bucket ready: ${MINIO_BUCKET:-rqmd-telemetry}'
      "

  telemetry-gateway:
    build:
      context: ./infra/telemetry-gateway
    image: rqmd-telemetry-gateway:local
    container_name: rqmd-telemetry-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      TELEMETRY_PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-rqmd}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rqmd_telemetry}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-rqmd-telemetry}
      MINIO_REGION: us-east-1
      MINIO_SECURE: "false"
      TELEMETRY_API_KEY: ${TELEMETRY_API_KEY:?set TELEMETRY_API_KEY in .env.telemetry.v1}
    ports:
      - "${TELEMETRY_PORT:-18080}:8080"

  postgres-admin:
    image: adminer:latest
    container_name: rqmd-telemetry-postgres-admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${ADMINER_PORT:-18081}:8080"
    profiles:
      - admin
