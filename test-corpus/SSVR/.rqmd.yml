# .rqmd.yml
statuses:
  - name: Proposed
    shortcode: P
    emoji: "💡"
  - name: Implemented
    shortcode: I
    emoji: "🔧"
  - name: Desktop-Verified
    shortcode: DV
    emoji: "💻"
  - name: VR-Verified
    shortcode: VV
    emoji: "🎮"
  - name: Done
    shortcode: D
    emoji: "✅"
  - name: " Janky"
    shortcode: J
    emoji: "⚠️  "
  - name: Blocked
    shortcode: B
    emoji: "⛔"
  - name: Deprecated
    shortcode: X
    emoji: "🗑️"

priorities:
  - name: Critical
    shortcode: p0
    emoji: "🔴"
  - name: High
    shortcode: p1
    emoji: "🟠"
  - name: Medium
    shortcode: p2
    emoji: "🟡"
  - name: Low
    shortcode: p3
    emoji: "🟢"
  - name: Eventually
    shortcode: p4
    emoji: "🔵"
  - name: Dreams
    shortcode: p5
    emoji: "☁️"

rollup_map:
  Proposed: [proposed, janky]
  Build-Ready: [implemented, desktop-verified]
  Complete: [vr-verified, done]
  Parked: [blocked, deprecated]
