name: publish-pypi

on:
  push:
    tags:
      - "v*rc*"
  release:
    types: [published]

jobs:
  publish:
    if: ${{ github.event_name == 'push' || (github.event_name == 'release' && !contains(github.event.release.tag_name, 'rc')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/rqmd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Ensure release tag and project metadata match
        env:
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
        run: python scripts/ensure_release_tag.py

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
