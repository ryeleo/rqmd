group_labels:
  catalog_setup: Catalog setup
  developer_workflows: Developer workflows
  validation_workflows: Validation workflows
  repository_understanding: Repository understanding
  backlog_sources: Backlog sources
  review_notes: Review notes
group_order:
  - catalog_setup
  - developer_workflows
  - validation_workflows
  - repository_understanding
  - backlog_sources
  - review_notes
interaction_contract:
  interaction_mode: ask-user
  preferred_ui: multi-choice
  presentation: one-question-at-a-time
  next_action: collect-answers-before-rerun
  confirmation_policy: defer-recaps-until-review
  selection_behavior: show-default-checked-values
  instructions:
    - Present each question as an interactive multi-choice selection instead of paraphrasing the payload.
    - Start any values from option_annotations.default_checked_values as already selected.
    - Ask one question at a time in the provided flow order and only accept custom answers when the question allows them.
    - Do not recap all prior selections after each question unless the user asks for a summary.
    - Collect the interview answers first, then rerun rqmd-ai with repeated --answer FIELD=VALUE entries.
id_prefix_question:
  label: Requirement ID prefix
  prompt_suffix: Prefer a short project-specific key when possible so IDs stay recognizable and avoid collisions across catalogs.
  custom_answer_prompt: Type a custom project-specific requirement ID prefix, for example `ACCLI`.
  project_specific_description: Recommended project-specific short key inferred from the repository name. Prefer this over generic fallbacks when it fits your team.
  inferred_description: Current inferred or configured prefix.
  inferred_description_when_project_specific: Current inferred or configured prefix. A project-specific short key is usually a better long-term choice when you want clearer requirement IDs.
  options:
    - value: REQ
      label: REQ
      description: Generic sequential requirement prefix. Use this if you do not want a project-specific key yet.
      safe_default: true
    - value: RQMD
      label: RQMD
      description: Repository-level rqmd prefix. Useful as a generic fallback.
    - value: AC
      label: AC
      description: Acceptance criteria style prefix. Useful when matching existing team language.
bootstrap:
  field_order:
    - dev_environment
    - dev_build
    - dev_run
    - dev_smoke
    - test_primary
    - test_integration
    - test_lint
    - notes
  fields:
    dev_environment:
      group: developer_workflows
      label: Development environment setup
      prompt: Which setup commands should /dev use before building or running this project?
      allow_multiple: true
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: true
      custom_answer_prompt: Add another custom command.
    dev_build:
      group: developer_workflows
      label: Build commands
      prompt: Which build commands should /dev treat as canonical?
      allow_multiple: true
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: true
      custom_answer_prompt: Add another custom command.
    dev_run:
      group: developer_workflows
      label: Run or dev-server commands
      prompt: Which run or dev-server commands should /dev use?
      allow_multiple: true
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: true
      custom_answer_prompt: Add another custom command.
    dev_smoke:
      group: developer_workflows
      label: Smoke-test commands
      prompt: Which smoke-test commands should /dev use for quick checks?
      allow_multiple: true
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: true
      custom_answer_prompt: Add another custom command.
    test_primary:
      group: validation_workflows
      label: Primary automated test commands
      prompt: Which primary automated test commands should /test use?
      allow_multiple: true
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: true
      custom_answer_prompt: Add another custom command.
    test_integration:
      group: validation_workflows
      label: Integration or end-to-end test commands
      prompt: Which integration or end-to-end test commands should /test use?
      allow_multiple: true
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: true
      custom_answer_prompt: Add another custom command.
    test_lint:
      group: validation_workflows
      label: Lint and static check commands
      prompt: Which lint or static verification commands should /test use?
      allow_multiple: true
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: true
      custom_answer_prompt: Add another custom command.
    notes:
      group: review_notes
      label: Bootstrap notes
      prompt: What review notes or caveats should be carried into the generated skills?
      allow_multiple: true
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: false
      custom_answer_prompt: Add another command or note.
starter_init:
  field_order:
    - requirements_dir
    - id_prefix
    - starter_notes
  fields:
    requirements_dir:
      group: catalog_setup
      label: Requirements directory
      prompt: Where should rqmd create the starter requirements catalog?
      allow_multiple: false
      allow_custom: true
      allow_skip: false
      first_selected_is_canonical: true
      custom_answer_prompt: Type a custom requirements directory path.
    id_prefix:
      group: catalog_setup
      prompt: Which requirement ID prefix should the starter scaffold use?
    starter_notes:
      group: review_notes
      label: Starter scaffold notes
      prompt: What notes should guide the first refinement pass after the starter scaffold is created?
      allow_multiple: true
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: false
      custom_answer_prompt: Add another starter note.
legacy_init:
  field_order:
    - requirements_dir
    - id_prefix
    - docs_review
    - source_grokking
    - test_grokking
    - domain_focus
    - issue_backlog
    - legacy_notes
  fields:
    requirements_dir:
      group: catalog_setup
      label: Requirements directory
      prompt: Where should rqmd create the starter requirements catalog?
      allow_multiple: false
      allow_custom: true
      allow_skip: false
      first_selected_is_canonical: true
      custom_answer_prompt: Type a custom requirements directory path.
    id_prefix:
      group: catalog_setup
      label: Requirement ID prefix
      prompt: Which requirement ID prefix should legacy-init use for the starter catalog?
      allow_multiple: false
      allow_custom: true
      allow_skip: false
      first_selected_is_canonical: true
      custom_answer_prompt: Type a custom requirement ID prefix.
    docs_review:
      group: repository_understanding
      label: Docs review strategy
      prompt: How should legacy-init treat existing repository docs when seeding the first-pass catalog?
      allow_multiple: true
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: false
      custom_answer_prompt: Add a custom docs-review note or rule.
    source_grokking:
      group: repository_understanding
      label: Source understanding depth
      prompt: How deeply should the AI spend effort understanding the source tree during legacy bootstrap?
      allow_multiple: false
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: true
      custom_answer_prompt: Add a custom source-understanding preference.
    test_grokking:
      group: repository_understanding
      label: Test understanding depth
      prompt: How deeply should the AI spend effort understanding the repository's test strategy during legacy bootstrap?
      allow_multiple: false
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: true
      custom_answer_prompt: Add a custom test-understanding preference.
    domain_focus:
      group: repository_understanding
      label: Starter domain focus
      prompt: Which detected areas should become starter requirement files first?
      allow_multiple: true
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: false
      custom_answer_prompt: Add a custom source area or subsystem to seed.
    issue_backlog:
      group: backlog_sources
      label: Issue backlog handling
      prompt: How should legacy-init handle GitHub issue discovery and backlog seeding?
      allow_multiple: false
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: true
      custom_answer_prompt: Add a custom backlog-handling note.
    legacy_notes:
      group: review_notes
      label: Legacy bootstrap notes
      prompt: What extra review notes or caveats should be carried into the generated starter catalog?
      allow_multiple: true
      allow_custom: true
      allow_skip: true
      first_selected_is_canonical: false
      custom_answer_prompt: Add another legacy-bootstrap note.
  option_sets:
    docs_review:
      - value: use-current-docs
        label: Use the current docs as source material
        description: Let the bootstrap seed requirements from the repo's present docs and READMEs.
      - value: avoid-stale-docs
        label: Treat stale or legacy docs cautiously
        description: Bias the bootstrap toward current source and tests when docs look outdated.
      - value: readmes-first
        label: Read top-level READMEs first
        description: Favor README-style docs before broader markdown sweeps.
    source_grokking:
      - value: focused-pass
        label: Focused pass
        description: Spend a bounded pass on the most relevant source areas only.
      - value: broad-pass
        label: Broad pass
        description: Spend extra time building a wider mental model of the source tree.
      - value: quick-scan
        label: Quick scan
        description: Prefer a lighter scan and let the generated seeds stay coarse.
    test_grokking:
      - value: focused-tests
        label: Focused test pass
        description: Inspect the core test workflow and representative tests.
      - value: deep-tests
        label: Deep test pass
        description: Spend extra time understanding test helpers, fixtures, and coverage patterns.
      - value: light-tests
        label: Light test scan
        description: Infer the test strategy from surface signals unless something looks unusual.
    issue_backlog:
      - value: use-gh-if-available
        label: Use GitHub issues when available
        description: Seed a backlog file from `gh issue list` when the CLI is installed and authenticated.
      - value: skip-gh-issues
        label: Skip GitHub issue seeding
        description: Do not create issue-derived starter requirements.
      - value: issues-as-signals-only
        label: Treat issues as weak signals
        description: Use issues to inform the initial catalog, but keep the generated backlog conservative.
